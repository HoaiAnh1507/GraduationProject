spring.application.name=backend
# Load .env from project folder (or parent) so APP_* variables are visible as properties.
spring.config.import=optional:file:.env[.properties],optional:file:../.env[.properties]
spring.autoconfigure.exclude=org.springframework.ai.vectorstore.pgvector.autoconfigure.PgVectorStoreAutoConfiguration

# LLM configuration (mapped from .env variables)
app.llm.enabled=${APP_LLM_ENABLED:false}
app.llm.provider=${APP_LLM_PROVIDER:openai}
app.llm.base-url=${APP_LLM_BASE_URL:}
app.llm.api-key=${APP_LLM_API_KEY:}
app.llm.model=${APP_LLM_MODEL:}
app.llm.chat-path=${APP_LLM_CHAT_PATH:/v1/chat/completions}
app.llm.temperature=${APP_LLM_TEMPERATURE:0.2}

# Hugging Face Inference API - Embeddings
# Put your token in .env as HF_TOKEN=... (or set it as an environment variable)
app.hf.token=${HF_TOKEN:}
app.hf.embedding-url=${APP_HF_EMBEDDING_URL:https://router.huggingface.co/hf-inference/models/BAAI/bge-m3/pipeline/feature-extraction}
app.hf.embedding-dim=${APP_HF_EMBEDDING_DIM:1024}
app.hf.wait-for-model=${APP_HF_WAIT_FOR_MODEL:true}

# PostgreSQL (Docker) connection
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:chatbot_history_rag}
spring.datasource.username=${DB_USERNAME:admin}
spring.datasource.password=${DB_PASSWORD:admin}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET TIME ZONE '${APP_DB_TIMEZONE:Asia/Ho_Chi_Minh}'

# Redis (rate limit + token blacklist)
spring.data.redis.host=${REDIS_HOST:localhost}
spring.data.redis.port=${REDIS_PORT:6379}
spring.data.redis.database=${REDIS_DATABASE:0}
spring.data.redis.password=${REDIS_PASSWORD:}

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway (schema managed by migration scripts)
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=true
spring.flyway.baseline-version=0
spring.flyway.validate-on-migrate=true

# Spring AI - PGVector
spring.ai.vectorstore.pgvector.enabled=false
spring.ai.vectorstore.pgvector.initialize-schema=false
spring.ai.vectorstore.pgvector.dimensions=1024
spring.ai.vectorstore.pgvector.index-type=hnsw
spring.ai.vectorstore.pgvector.distance-type=cosine_distance
spring.ai.vectorstore.pgvector.table-name=rag_chunks

# Documents storage (PDF files)
# documents.source_file is resolved relative to this folder unless it is an absolute path (and allow-absolute-path=true)
app.documents.storage-root=${APP_DOCUMENTS_STORAGE_ROOT:}
app.documents.allow-absolute-path=${APP_DOCUMENTS_ALLOW_ABSOLUTE_PATH:false}

# Page image rendering (for bbox highlight overlays)
app.documents.page-image.dpi=${APP_DOCUMENTS_PAGE_IMAGE_DPI:150}

# Auth settings
app.auth.jwt-secret=${APP_AUTH_JWT_SECRET:}
app.auth.jwt-issuer=${APP_AUTH_JWT_ISSUER:backend}
app.auth.access-token-minutes=${APP_AUTH_ACCESS_TOKEN_MINUTES:15}
app.auth.refresh-token-days=${APP_AUTH_REFRESH_TOKEN_DAYS:7}
app.auth.cookie-secure=${APP_AUTH_COOKIE_SECURE:false}
app.auth.cookie-same-site=${APP_AUTH_COOKIE_SAME_SITE:Lax}

# Guest chat rate limit (Redis TTL counters; no DB writes for guests)
app.guest.rate-limit.ip-per-minute=${APP_GUEST_RATE_LIMIT_IP_PER_MINUTE:10}
app.guest.rate-limit.session-per-minute=${APP_GUEST_RATE_LIMIT_SESSION_PER_MINUTE:4}

# Login brute-force protection (Redis-backed)
app.auth.login.max-failed-attempts=${APP_AUTH_LOGIN_MAX_FAILED_ATTEMPTS:5}
app.auth.login.lock-minutes=${APP_AUTH_LOGIN_LOCK_MINUTES:15}

# Swagger / OpenAPI (springdoc)
app.swagger.enabled=${APP_SWAGGER_ENABLED:true}
springdoc.api-docs.enabled=${app.swagger.enabled}
springdoc.swagger-ui.enabled=${app.swagger.enabled}
springdoc.swagger-ui.path=/swagger-ui.html
